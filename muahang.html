<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Trang mua hàng</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: #f5f5f5
        }

        header {
            background: #2b6cb0;
            color: #fff;
            padding: 12px 20px
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px
        }

        .products {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px
        }

        .card {
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .1)
        }

        .card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 6px
        }

        .card h3 {
            margin: 8px 0 4px;
            font-size: 16px
        }

        .card p {
            margin: 0 0 8px;
            color: #555
        }

        .card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        button {
            background: #2b6cb0;
            color: #fff;
            border: 0;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer
        }

        .cart {
            flex: 1;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            height: fit-content;
            box-shadow: 0 1px 6px rgba(0, 0, 0, .08)
        }

        .cart h3 {
            margin-top: 0
        }

        .cart-item {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee
        }

        .cart-item img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 6px
        }

        .qty {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .qty button {
            padding: 4px 7px;
            background: #eee;
            color: #333;
            border-radius: 4px
        }

        .total {
            font-weight: 700;
            margin-top: 12px
        }

        .empty {
            color: #777
        }
    </style>
</head>

<body>
    <header>
        <h1 style="margin:0;font-size:20px">Cửa hàng mẫu</h1>
    </header>
    <main class="container">
        <section class="products" id="products"></section>
        <aside class="cart">
            <h3>Giỏ hàng</h3>
            <div id="cart-list"></div>
            <div class="total" id="total">Tổng: 0₫</div>
            <div style="margin-top:10px">
                <button id="checkout">Thanh toán</button>
            </div>
        </aside>
    </main>

    <script>
        const products = [
            { id: 1, name: 'Áo thun cotton', price: 199000, img: 'https://picsum.photos/seed/p1/400/300' },
            { id: 2, name: 'Quần jeans', price: 349000, img: 'https://picsum.photos/seed/p2/400/300' },
            { id: 3, name: 'Giày thể thao', price: 599000, img: 'https://picsum.photos/seed/p3/400/300' },
            { id: 4, name: 'Ba lô nhỏ', price: 259000, img: 'https://picsum.photos/seed/p4/400/300' }
        ];

        const cart = {};

        const fmt = n => n.toLocaleString('vi-VN') + '₫';

        function renderProducts() {
            const el = document.getElementById('products');
            el.innerHTML = products.map(p => `
				<div class="card">
					<img src="${p.img}" alt="${p.name}">
					<h3>${p.name}</h3>
					<p>${fmt(p.price)}</p>
					<div class="meta">
						<small></small>
						<button onclick="addToCart(${p.id})">Thêm vào giỏ</button>
					</div>
				</div>
			`).join('');
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const items = Object.values(cart);
            if (items.length === 0) { list.innerHTML = '<div class="empty">Giỏ hàng trống</div>'; document.getElementById('total').textContent = 'Tổng: 0₫'; return }
            list.innerHTML = items.map(it => `
				<div class="cart-item">
					<img src="${it.img}" alt="">
					<div style="flex:1">
						<div>${it.name}</div>
						<div style="color:#666">${fmt(it.price)} x ${it.qty} = ${fmt(it.price * it.qty)}</div>
					</div>
					<div class="qty">
						<button onclick="changeQty(${it.id},-1)">-</button>
						<div>${it.qty}</div>
						<button onclick="changeQty(${it.id},1)">+</button>
					</div>
				</div>
			`).join('');
            const total = items.reduce((s, i) => s + i.price * i.qty, 0);
            document.getElementById('total').textContent = 'Tổng: ' + fmt(total);
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if (!cart[id]) cart[id] = { ...p, qty: 1 }; else cart[id].qty++;
            renderCart();
        }

        function changeQty(id, delta) {
            if (!cart[id]) return;
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            renderCart();
        }

        document.getElementById('checkout').addEventListener('click', () => {
            const items = Object.values(cart);
            if (items.length === 0) { alert('Giỏ hàng trống'); return }
            const total = items.reduce((s, i) => s + i.price * i.qty, 0);
            alert('Cảm ơn! Tổng thanh toán: ' + fmt(total));
            for (const k in cart) delete cart[k];
            renderCart();
        });

        renderProducts(); renderCart();
    </script>
</body>

</html>
